<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="popup-container">
    <div class="header-3d">
      <div class="title-logo">CELESTIAL HUB</div>
      <div class="status-indicator">
        <div class="dot-pulse"></div>
        <span>ACTIVE</span>
      </div>
    </div>

    <div class="glass-console">
      <p class="label-micro">Context State</p>
      <h2 id="focusState" class="value-large">Focused</h2>
    </div>

    <div class="glass-console">
      <p class="label-micro">Actions Pending</p>
      <h2 id="actionCount" class="value-large">03</h2>
      <button class="btn-glass" id="openActions">Manage Console</button>
    </div>

    <div class="glass-console">
      <p class="label-micro">Held Notifications</p>
      <h3 id="delayedCount" class="value-large">08</h3>
      <button class="btn-glass" id="releaseAll">Release Orbit</button>
    </div>

    <button class="btn-primary-neon" id="openDashboard">Open Command Center</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
